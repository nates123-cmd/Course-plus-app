  <body>
    <div id="root"></div>
    <!-- Register the Course+ service worker INLINE (not from the JS bundle): the
         rolldown minifier strips navigator.serviceWorker.register() from the
         module bundle as a dead expression, so it has to live here. /Course-plus-app/ is
         replaced by Vite with the app base (/Course-plus-app/ in prod, / in dev).
         Own-scope worker → wins over any sibling suite app's root-scope SW for our
         pages, and is network-first on the shell so deploys apply immediately.
         (Replaces the old "unregister all + wipe every cache on load" hack, which
         also nuked the cached on-device Whisper model.) -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/Course-plus-app/sw.js', { scope: '/Course-plus-app/' }).catch(function () {});
        });
      }
    </script>
  </body>
